<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon AI | Talha Celik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .dragon-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); }
        .tab-btn.active { border-bottom: 3px solid #ec4899; color: #ec4899; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div id="loginPage" class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl mt-20 border border-slate-700">
        <h2 class="text-3xl font-bold text-center mb-6 dragon-gradient bg-clip-text text-transparent">Giriş Yap</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-pink-500">
        <input type="password" id="password" placeholder="Şifre" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-pink-500">
        <button onclick="login()" class="w-full dragon-gradient py-3 rounded-xl font-bold hover:scale-105 transition-all">Sistemi Başlat</button>
    </div>

    <div id="mainPanel" class="hidden w-full max-w-5xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black dragon-gradient bg-clip-text text-transparent">DRAGON AI v2</h1>
            <button onclick="logout()" class="text-slate-400 hover:text-white">Çıkış Yap</button>
        </div>

        <div class="flex space-x-8 border-b border-slate-700 mb-8">
            <button onclick="showTab('generate')" id="tabGen" class="tab-btn active pb-2 font-bold">Üretim</button>
            <button onclick="showTab('history')" id="tabHist" class="tab-btn pb-2 font-bold">Geçmiş</button>
            <button onclick="showTab('train')" id="tabTrain" class="tab-btn pb-2 font-bold">Eğitim (Öğrenme)</button>
        </div>

        <div id="genSection" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <textarea id="prompt" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 outline-none" placeholder="Ne üretmek istersin Talha?"></textarea>
                <button onclick="generateImage()" id="genBtn" class="w-full dragon-gradient py-4 rounded-xl font-bold">GÖRSELİ ÜRET</button>
            </div>
            <div class="bg-slate-800 rounded-2xl border border-slate-700 flex items-center justify-center overflow-hidden min-h-[400px]">
                <img id="resImg" class="hidden w-full h-full object-contain" src="">
                <p id="placeholder" class="text-slate-500">Görsel burada belirecek...</p>
            </div>
        </div>

        <div id="histSection" class="hidden">
            <div id="historyGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </div>

        <div id="trainSection" class="hidden bg-slate-800 p-8 rounded-2xl border border-slate-700">
            <h3 class="text-xl font-bold mb-4">Yeni Bir Şey Öğret</h3>
            <p class="text-slate-400 mb-6 text-sm">Zekaya öğretmek istediğin görseli seç ve onu tanımlayan metni ekle.</p>
            <input type="file" id="trainFile" class="mb-4 block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-pink-600 file:text-white">
            <textarea id="trainTags" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mb-4 outline-none" placeholder="Örn: talha_celik, a man with beard, cinematic lighting..."></textarea>
            <button class="bg-blue-600 w-full py-3 rounded-xl font-bold">EĞİTİMİ BAŞLAT</button>
        </div>
    </div>

    <script>
        // --- LOGIN MANTIĞI ---
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "Talha Celik" && pass === "Talha") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                loadHistory(); // Giriş yapınca geçmişi yükle
            } else {
                alert("Hatalı Giriş!");
            }
        }

        // --- SEKME MANTIĞI ---
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('genSection').classList.add('hidden');
            document.getElementById('histSection').classList.add('hidden');
            document.getElementById('trainSection').classList.add('hidden');

            if(tab === 'generate') {
                document.getElementById('genSection').classList.remove('hidden');
                document.getElementById('tabGen').classList.add('active');
            } else if(tab === 'history') {
                document.getElementById('histSection').classList.remove('hidden');
                document.getElementById('tabHist').classList.add('active');
                loadHistory();
            } else {
                document.getElementById('trainSection').classList.remove('hidden');
                document.getElementById('tabTrain').classList.add('active');
            }
        }

        // --- GEÇMİŞİ YÜKLE ---
        async function loadHistory() {
            const username = "Talha Celik"; // Şimdilik sabit, login'den de gelebilir
            const grid = document.getElementById('historyGrid');
            grid.innerHTML = "<p class='text-slate-500'>Yükleniyor...</p>";
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/history/${username}`);
                const images = await response.json();
                grid.innerHTML = "";
                
                images.forEach(imgName => {
                    const img = document.createElement('img');
                    // Tam yol: outputs/Talha Celik/dragon-25042026.png
                    img.src = `http://127.0.0.1:8000/outputs/${username}/${imgName}`;
                    img.className = "rounded-lg border border-slate-700 hover:scale-105 transition-all cursor-pointer";
                    grid.appendChild(img);
                });
            } catch(e) { 
                console.error("Geçmiş yüklenemedi."); 
                grid.innerHTML = "<p class='text-red-500'>Bağlantı hatası!</p>";
            }
        }

        // --- GÖRSEL ÜRETİM (Aynı Mantık) ---
        async function generateImage() {
            // ... (Önceki yazdığımız fetch kodunun aynısı buraya gelecek)
        }
    </script>
</body>
</html>
